version: "3.9"

services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  server:
    build: ./apps/server
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/legal

  client:
    build: ./apps/client
    ports:
      - "5173:5173"
    depends_on:
      - server
